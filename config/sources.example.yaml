# Source registry example — copy to config/sources.local.yaml and edit.
# config/*.local.yaml is git-ignored.
#
# Greenhouse boards are addressed by board_token (the slug in
# job-boards.greenhouse.io/<token>). There is no public directory of all
# companies — list the ones you care about. Tokens verified 2026-07-17
# (see docs/source-catalog/greenhouse.md §8).

sources:
  - id: greenhouse:gitlab
    adapter: greenhouse
    board_token: gitlab
    company_name: GitLab
    enabled: true
    rate_limit_per_minute: 30

  - id: greenhouse:cloudflare
    adapter: greenhouse
    board_token: cloudflare
    company_name: Cloudflare
    enabled: true
    rate_limit_per_minute: 30

  # Lever: board_token = site slug de jobs.lever.co/<site>
  - id: lever:spotify
    adapter: lever
    board_token: spotify
    company_name: Spotify
    enabled: true
    rate_limit_per_minute: 30

  # Ashby: board_token = jobBoardName de jobs.ashbyhq.com/<name>
  - id: ashby:linear
    adapter: ashby
    board_token: linear
    company_name: Linear
    enabled: true
    rate_limit_per_minute: 30

  # SmartRecruiters: board_token = companyIdentifier de
  # jobs.smartrecruiters.com/<identifier>. DESHABILITADO por defecto:
  # lee docs/source-catalog/smartrecruiters.md §9 y docs/adr/0002 (robots.txt
  # del host) antes de poner enabled: true en tu sources.local.yaml.
  - id: smartrecruiters:smartrecruiters
    adapter: smartrecruiters
    board_token: smartrecruiters
    company_name: SmartRecruiters
    enabled: false
    rate_limit_per_minute: 30
    notes: "Ver ADR-0002 antes de habilitar"
